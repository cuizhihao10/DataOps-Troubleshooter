services:
  api:
    build:
      context: .
    environment:
      DATAOPS_ENVIRONMENT: docker
    ports:
      - "${DATAOPS_API_PORT:-18000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
